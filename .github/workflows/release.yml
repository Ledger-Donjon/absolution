---
name: 🚀 Release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.release_tag }}

jobs:
  build:
    environment: release
    strategy:
      matrix:
        os: [ubuntu-latest]
        optimize: [ReleaseSafe, ReleaseFast]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_tag }}
      - uses: Ledger-Donjon/absolution/.github/actions/setup-zig@main
      - run: zig build -Doptimize=${{ matrix.optimize }} -Dstrip=true -Dversion="${RELEASE_TAG}"
      - name: Upload tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: release-${{ matrix.os }}-${{ matrix.optimize }}
          path: zig-out/*
