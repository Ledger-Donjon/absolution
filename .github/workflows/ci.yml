---
name: ⚗️ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Ledger-Donjon/absolution/.github/actions/setup-zig@main
      - run: zig build test

  integration-test:
    needs: unit-test
    strategy:
      matrix:
        os: [ubuntu-latest]
        optimize: [ReleaseSafe, ReleaseFast]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: Ledger-Donjon/absolution/.github/actions/setup-zig@main
      - run: zig build -Doptimize=${{ matrix.optimize }}
      - run: zig run scripts/integration.zig  
