---
name: ⚗️ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          sparse-checkout: .github/actions
          path: _actions
      - uses: ./_actions/.github/actions/setup-zig
      - run: zig build test

  integration-test:
    needs: unit-test
    strategy:
      matrix:
        os: [ubuntu-latest]
        optimize: [ReleaseSafe, ReleaseFast]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          sparse-checkout: .github/actions
          path: _actions
      - uses: ./_actions/.github/actions/setup-zig
      - run: zig build -Doptimize=${{ matrix.optimize }}
      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
      - run: uv run scripts/integration.py
